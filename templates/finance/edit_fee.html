{% extends "base.html" %} 
{% block content %}
    {% include "includes/nav_bar_finance.html" %}
    <main class="main app-shell finance-page finance-form-page">
    <div class="container py-4">
        <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
        <div class="card form-card">
        <div class="card-header">
            <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Modifier le frais</h4>
        </div>
        <div class="card-body">
            <h2 class="form-card-title">{{ fee.name }}</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a href="{% url 'finance:index_fees' %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div>
        </div>
        </div>
        </div>
    </div>
    </main>
{% endblock %}
